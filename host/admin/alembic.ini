# Alembic config for the Homebox admin DB.
#
# The database URL is NOT set here — env.py derives it from the app settings
# (app.config.settings.database_url), swapping the asyncpg driver for psycopg
# so Alembic runs synchronously. Override for ad-hoc runs with ALEMBIC_DB_URL.
#
# Runtime migrations do not use this file at all: app.migrate builds the Config
# programmatically (script_location points at the packaged app/migrations dir).
# This file exists for the dev CLI, e.g. from host/admin/:
#   ALEMBIC_DB_URL=postgresql+psycopg://... alembic revision --autogenerate -m "..."
#   ALEMBIC_DB_URL=postgresql+psycopg://... alembic upgrade head
[alembic]
script_location = app/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
