# =============================================================================
# Homebox Base Infrastructure
# =============================================================================
# Provides: Traefik reverse proxy ONLY.
#
# Each project runs its own database, cache, and app containers in a separate
# compose stack. Projects join the shared "traefik-net" network so Traefik can
# route to them, but their backing services (Postgres, Redis, etc.) remain
# internal to the project — no host port conflicts.
#
# Start:  docker compose --env-file .env up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Docker socket proxy — exposes a filtered, read-only subset of the Docker
  # API to Traefik over TCP. Avoids giving Traefik full root via the socket
  # and works around Docker 29 + Traefik client-lib quirks.
  # ---------------------------------------------------------------------------
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: homebox-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-net

  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy & edge router
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: homebox-traefik
    restart: unless-stopped
    depends_on:
      - docker-proxy
    environment:
      # Docker 29 dropped legacy API versions; Traefik's docker client
      # defaults to v1.24, which the daemon rejects with 400. Pin a modern
      # version so the client doesn't try to negotiate against /v1.24.
      DOCKER_API_VERSION: "1.45"
    command:
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic_conf.yml"
      - "--providers.file.watch=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-net"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ${TRAEFIK_DYNAMIC_CONF_DIR:-/opt/homebox/traefik}/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml
    networks:
      - traefik-net
    # Traefik admin dashboard is reachable on the host at http://localhost:8080
    # (port 8080 published above). No public hostname route — that used to be
    # `dashboard.<HOMEBOX_DOMAIN>`, but the new install flow doesn't bake a
    # root domain in at install time, so there's nothing to interpolate.

  # ---------------------------------------------------------------------------
  # Cloudflared — tunnel to Cloudflare's edge. Deployed only when a
  # CLOUDFLARED_CONFIG_DIR is provided (configure.sh sets this once a tunnel
  # has been authenticated and routed).
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homebox-cloudflared
    restart: unless-stopped
    user: "0:0"
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ${CLOUDFLARED_CONFIG_DIR:-/dev/null}:/etc/cloudflared:ro
    networks:
      - traefik-net
    depends_on:
      - traefik
    profiles:
      - tunnel

networks:
  traefik-net:
    external: true
    name: traefik-net
